version: 5
source:
  strictNaming: true
  uid: mhdg-rg-flat-1.0.12
  variables:
    inputs:
      - name: projectCode
  processes:
    #
    # === Level 0: Read project and create top-level requirements ===
    #
    - code: mhdg-rg.read-project-task
      name: mhdg-rg.read-project-task
      function:
        code: mhdg-rg.read-project-task
        context: internal
      metas:
        - projectCode: projectCode
      outputs:
        - name: projectTask
          type: task
          nullable: false
          ext: .txt
        - name: decompositionPolicy
          type: decomposition-policy
          nullable: false
          ext: .txt
        - name: topLevelPolicy
          type: top-level-policy
          nullable: false
          ext: .txt
      timeoutBeforeTerminate: 60
    - code: mhdg-rg.top-level-task
      name: Convert project-level task to top-level requirements
      function:
        code: mhdg-rg.call-cc-1.0.12
      metas:
        - rg-mode: task
        - variable-for-topLevelPolicy: topLevelPolicy
        - variable-for-output: topLevelReqs
      inputs:
        - name: projectCode
        - name: projectTask
        - name: topLevelPolicy
      outputs:
        - name: topLevelReqs
          type: requirement
          ext: .jsonl
      timeoutBeforeTerminate: 120
      cache:
        enabled: true

    #
    # === Split top-level JSONL and store/process each requirement ===
