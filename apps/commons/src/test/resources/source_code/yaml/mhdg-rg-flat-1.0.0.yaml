    - code: mh.batch-line-splitter-0
      name: mh.batch-line-splitter-0
      function:
        code: mh.batch-line-splitter
        context: internal
      metas:
        - number-of-lines-per-task: 1
        - variable-for-splitting: topLevelReqs
        - output-is-dynamic: true
        - output-variable: reqJson0
        - is-array: false
      subProcesses:
        logic: sequential
        processes:
          - code: mhdg-rg.store-req-0
            name: Store single top-level requirement
            function:
              code: mhdg-rg.store-req
              context: internal
            metas:
              - reqJson: reqJson0
            inputs:
              - name: projectCode
              - name: reqJson0
            outputs:
              - name: requirementId0
                type: requirement-id
                nullable: false
                ext: .txt
            timeoutBeforeTerminate: 60

          - code: mhdg-rg.set-reset-task-id-0
            name: Set resetTaskId on top-level requirement
            function:
              code: mhdg-rg.set-reset-task-id
              context: internal
            metas:
              - requirementId: requirementId0
            inputs:
              - name: requirementId0
            timeoutBeforeTerminate: 60

          #
          # === Objective processing for top-level requirement ===
          #
          - code: mhdg-rg.check-objectives-1
            name: Check for pending objectives
            function:
              code: mhdg-rg.check-objectives
              context: internal
            metas:
              - requirementId: requirementId0
              - hasObjectives: hasObjectives1
              - requirementIdObj: requirementIdObj1
              - requirementContentObj: requirementContentObj1
              - objectiveTextObj: objectiveTextObj1
              - amendmentStatus: amendmentStatus1
              - amendmentStatus: amendmentStatus1
            inputs:
              - name: requirementId0
            outputs:
              - name: hasObjectives1
                type: boolean
                nullable: false
                ext: .txt
              - name: requirementIdObj1
                type: requirement-id
                nullable: true
                ext: .txt
              - name: requirementContentObj1
                type: requirement-content
                nullable: true
                ext: .txt
              - name: objectiveTextObj1
                type: objective-text
                nullable: true
                ext: .txt
              - name: amendmentStatus1
                type: amendment-status
                nullable: false
                ext: .txt
            timeoutBeforeTerminate: 60
          - code: mh.nop-objectives-wrapper-1
            name: mh.nop-objectives-wrapper-1
            function:
              code: mh.nop
              context: internal
            subProcesses:
              logic: sequential
              processes:
                - code: mh.nop-objectives-1
                  name: mh.nop-objectives-1
                  function:
                    code: mh.nop
                    context: internal
                  condition: 'hasObjectives1 ? true : false'
                  subProcesses:
                    logic: sequential
                    processes:
                      - code: mhdg-rg.evaluate-objective-1
                        name: Evaluate and apply objective
                        function:
                          code: mhdg-rg.call-cc-1.0.12
                        metas:
                          - rg-mode: req-objective
                          - variable-for-projectCode: projectCode
                          - variable-for-requirementContent: requirementContentObj1
                          - variable-for-requirementId: requirementIdObj1
                          - variable-for-objectiveText: objectiveTextObj1
                          - variable-for-output: objectiveResult1
                        inputs:
                          - name: projectCode
                          - name: requirementContentObj1
                          - name: requirementIdObj1
                          - name: objectiveTextObj1
                        outputs:
                          - name: objectiveResult1
                            type: objective-result
                            nullable: true
                            ext: .jsonl
                        timeoutBeforeTerminate: 300
                      - code: mhdg-rg.store-objective-result-1
                        name: Store objective result
                        function:
                          code: mhdg-rg.store-objective-result
                          context: internal
                        metas:
                            - objectiveResult: objectiveResult1
                            - amendmentStatus: amendmentStatus1
                        inputs:
                          - name: projectCode
                          - name: objectiveResult1
                        outputs:
                          - name: cascadeResult1
                            type: cascade-result
                            nullable: true
                            ext: .json
                          - name: amendmentStatus1
                            type: amendment-status
                            nullable: false
                            ext: .txt
                        timeoutBeforeTerminate: 60

          #
          # === Read, decompose (reads amended content if objective was applied) ===
          #
          - code: mhdg-rg.read-req-1
            function:
              code: mhdg-rg.read-req
              context: internal
            metas:
              - reqId: requirementId0
              - requirementContent: requirementContent1
              - parentId: parentId1
              - ancestorStack: ancestorStack1
            inputs:
              - name: requirementId0
            outputs:
              - name: requirementContent1
                type: requirement-content
                ext: .txt
              - name: parentId1
                type: parent-id
                ext: .txt
              - name: ancestorStack1
                type: ancestor-stack
                nullable: true
