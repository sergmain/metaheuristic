version: 5
source:
  strictNaming: true
  uid: mhdg-rg-1.0.4
  variables:
    inputs:
      - name: projectCode
  processes:
    - code: mh.evaluation2
      name: mh.evaluation2
      function:
        code: mh.evaluation
        context: internal
      outputs:
        - name: synthetic
          nullable: false
          ext: .txt
      metas:
        - expression: synthetic = true
    # === Level 0: Read project and create top-level requirements ===
    #
    - code: mhdg-rg.read-project-task
      name: mhdg-rg.read-project-task
      function:
        code: mhdg-rg.read-project-task
        context: internal
      metas:
        - projectCode: projectCode
        - decompositionPolicy: 'When decomposing a requirement, produce 1-2 child requirements.'
      outputs:
        - name: projectTask
          type: task
          nullable: false
          ext: .txt
        - name: decompositionPolicy
          type: decomposition-policy
          nullable: false
          ext: .txt
        - name: topLevelPolicy
          type: top-level-policy
          nullable: false
          ext: .txt
      timeoutBeforeTerminate: 60
    - code: mhdg-rg.top-level-task
      name: Convert project-level task to top-level requirements
      function:
        code: mhdg-rg.call-cc-1.0.4
      metas:
        - rg-mode: task
        - variable-for-topLevelPolicy: topLevelPolicy
        - variable-for-output: topLevelReqs
      inputs:
        - name: synthetic
        - name: projectCode
        - name: projectTask
        - name: topLevelPolicy
      outputs:
        - name: topLevelReqs
          type: requirement
          ext: .jsonl
      timeoutBeforeTerminate: 120
      cache:
        enabled: true

    #
    # === Split top-level JSONL and store each requirement individually ===
    #
    - code: mh.batch-line-splitter-0
      name: mh.batch-line-splitter-0
      function:
        code: mh.batch-line-splitter
        context: internal
      metas:
        - number-of-lines-per-task: 1
        - variable-for-splitting: topLevelReqs
        - output-is-dynamic: true
        - output-variable: reqJson0
        - is-array: false
      subProcesses:
        logic: sequential
        processes:
          - code: mhdg-rg.store-req-0
            name: Store single top-level requirement
            function:
              code: mhdg-rg.store-req
              context: internal
            metas:
              - reqJson: reqJson0
            inputs:
              - name: projectCode
              - name: reqJson0
                ext: .json
            outputs:
              - name: requirementId0
                type: requirement-id
                nullable: false
                ext: .txt
            timeoutBeforeTerminate: 60

          - code: mhdg-rg.set-reset-task-id-0
            name: Set resetTaskId on top-level requirement
            function:
              code: mhdg-rg.set-reset-task-id
              context: internal
            metas:
              - requirementId: requirementId0
            inputs:
              - name: requirementId0
            timeoutBeforeTerminate: 60

          #
          # === Objective processing for this top-level requirement ===
          #
          - code: mhdg-rg.check-objectives
            name: Check for pending objectives
            function:
              code: mhdg-rg.check-objectives
              context: internal
            metas:
              - requirementId: requirementId0
              - hasObjectives: hasObjectives
              - requirementIdObj: requirementIdObj
              - requirementContentObj: requirementContentObj
              - objectiveTextObj: objectiveTextObj
              - amendmentStatus: amendmentStatus
            inputs:
              - name: requirementId0
            outputs:
              - name: hasObjectives
                type: boolean
                nullable: false
                ext: .txt
              - name: requirementIdObj
                type: requirement-id
                nullable: true
                ext: .txt
              - name: requirementContentObj
                type: requirement-content
                nullable: true
                ext: .txt
              - name: objectiveTextObj
                type: objective-text
                nullable: true
                ext: .txt
              - name: amendmentStatus
                type: amendment-status
                nullable: false
                ext: .txt
            timeoutBeforeTerminate: 60
          - code: mh.nop-objectives-wrapper
            name: mh.nop-objectives-wrapper
            function:
              code: mh.nop
              context: internal
            subProcesses:
              logic: sequential
              processes:
                - code: mh.nop-objectives
                  name: mh.nop-objectives
                  function:
                    code: mh.nop
                    context: internal
                  condition: 'hasObjectives ? true : false'
                  subProcesses:
                    logic: sequential
                    processes:
                      - code: mhdg-rg.evaluate-objective
                        name: Evaluate and apply objective
                        function:
                          code: mhdg-rg.call-cc-1.0.4
                        metas:
                          - rg-mode: req-objective
                          - variable-for-projectCode: projectCode
                          - variable-for-requirementContent: requirementContentObj
                          - variable-for-requirementId: requirementIdObj
                          - variable-for-objectiveText: objectiveTextObj
                          - variable-for-output: objectiveResult
                        inputs:
                          - name: synthetic
                          - name: projectCode
                          - name: requirementContentObj
                          - name: requirementIdObj
                          - name: objectiveTextObj
                        outputs:
                          - name: objectiveResult
                            type: objective-result
                            nullable: true
                            ext: .jsonl
                        timeoutBeforeTerminate: 300
                      - code: mhdg-rg.store-objective-result
                        name: Store objective result
                        function:
                          code: mhdg-rg.store-objective-result
                          context: internal
                        metas:
                            - objectiveResult: objectiveResult
                            - amendmentStatus: amendmentStatus
                        inputs:
                          - name: projectCode
                          - name: objectiveResult
                        outputs:
                          - name: cascadeResult
                            type: cascade-result
                            nullable: true
                            ext: .json
                          - name: amendmentStatus
                            type: amendment-status
                            nullable: false
                            ext: .txt
                        timeoutBeforeTerminate: 60

          #
          # === ACTIVE/OBSOLETE condition gate ===
          # amendmentStatus is set by check-objectives (default "ACTIVE") and
          # overwritten by store-objective-result when objectives exist.
          #
          - code: mh.nop-amendment-gate
            name: mh.nop-amendment-gate
            function:
              code: mh.nop
              context: internal
            subProcesses:
              logic: and
              processes:
                #
                # === ACTIVE branch: Read, decompose (reads amended content if objective was applied) ===
                #
                - code: mh.nop-active-branch
                  name: mh.nop-active-branch
                  function:
                    code: mh.nop
                    context: internal
                  condition: 'amendmentStatus == "ACTIVE" ? true : false'
                  subProcesses:
                    logic: sequential
                    processes:
                      - code: mhdg-rg.read-req-1
                        function:
                          code: mhdg-rg.read-req
                          context: internal
                        metas:
                          - reqId: requirementId0
                          - requirementContent: requirementContent1
                          - parentId: parentId1
                          - ancestorStack: ancestorStack1
                        inputs:
                          - name: requirementId0
                        outputs:
                          - name: requirementContent1
                            type: requirement-content
                            ext: .txt
                          - name: parentId1
                            type: parent-id
                            ext: .txt
                          - name: ancestorStack1
                            type: ancestor-stack
                            nullable: true
                            ext: .jsonl
                        timeoutBeforeTerminate: 60
                      - code: mhdg-rg.decompose-1
                        function:
                          code: mhdg-rg.call-cc-1.0.4
                        metas:
                          - rg-mode: decompose
                          - variable-for-projectCode: projectCode
                          - variable-for-requirementContent: requirementContent1
                          - variable-for-parentId: parentId1
                          - variable-for-decompositionPolicy: decompositionPolicy
                          - variable-for-output: topLevelReqs1
                          - variable-for-ancestorStack: ancestorStack1
                        inputs:
                          - name: synthetic
                          - name: projectCode
                          - name: requirementContent1
                          - name: parentId1
                          - name: decompositionPolicy
                          - name: ancestorStack1
                            nullable: true
                        outputs:
                          - name: topLevelReqs1
                            type: requirement
                            ext: .jsonl
                        timeoutBeforeTerminate: 180
                        cache:
                          enabled: true

                      #
                      # === Level 2: Split decomposed JSONL and store each child requirement ===
                      #
                      - code: mh.batch-line-splitter-1
                        name: mh.batch-line-splitter-1
                        function:
                          code: mh.batch-line-splitter
                          context: internal
                        metas:
                          - number-of-lines-per-task: 1
                          - variable-for-splitting: topLevelReqs1
                          - output-is-dynamic: true
                          - output-variable: reqJson1
                          - is-array: false
                        subProcesses:
                          logic: sequential
                          processes:
                            - code: mhdg-rg.store-req-1
                              name: Store single level-1 requirement
                              function:
                                code: mhdg-rg.store-req
                                context: internal
                              metas:
                                - reqJson: reqJson1
                                - parentId: parentId1
                              inputs:
                                - name: projectCode
                                - name: reqJson1
                                - name: parentId1
                              outputs:
                                - name: requirementId1
                                  type: requirement-id
                                  nullable: false
                                  ext: .txt
                              timeoutBeforeTerminate: 60

                            - code: mhdg-rg.set-reset-task-id-1
                              name: Set resetTaskId on level-1 requirement
                              function:
                                code: mhdg-rg.set-reset-task-id
                                context: internal
                              metas:
                                - requirementId: requirementId1
                              inputs:
                                - name: requirementId1
                              timeoutBeforeTerminate: 60

                            #
                            # === Objective processing for level-1 requirement ===
                            #
                            - code: mhdg-rg.check-objectives-2
                              name: Check for pending objectives
                              function:
                                code: mhdg-rg.check-objectives
                                context: internal
                              metas:
                                - requirementId: requirementId1
                                - hasObjectives: hasObjectives2
                                - requirementIdObj: requirementIdObj2
                                - requirementContentObj: requirementContentObj2
                                - objectiveTextObj: objectiveTextObj2
                                - amendmentStatus: amendmentStatus2
                              inputs:
                                - name: requirementId1
                              outputs:
                                - name: hasObjectives2
                                  type: boolean
                                  nullable: false
                                  ext: .txt
                                - name: requirementIdObj2
                                  type: requirement-id
                                  nullable: true
                                  ext: .txt
                                - name: requirementContentObj2
                                  type: requirement-content
                                  nullable: true
                                  ext: .txt
                                - name: objectiveTextObj2
                                  type: objective-text
                                  nullable: true
                                  ext: .txt
                                - name: amendmentStatus2
                                  type: amendment-status
                                  nullable: false
                                  ext: .txt
                              timeoutBeforeTerminate: 60
                            - code: mh.nop-objectives-wrapper-2
                              name: mh.nop-objectives-wrapper-2
                              function:
                                code: mh.nop
                                context: internal
                              subProcesses:
                                logic: sequential
                                processes:
                                  - code: mh.nop-objectives-2
                                    name: mh.nop-objectives-2
                                    function:
                                      code: mh.nop
                                      context: internal
                                    condition: 'hasObjectives2 ? true : false'
                                    subProcesses:
                                      logic: sequential
                                      processes:
                                        - code: mhdg-rg.evaluate-objective-2
                                          name: Evaluate and apply objective
                                          function:
                                            code: mhdg-rg.call-cc-1.0.4
                                          metas:
                                            - rg-mode: req-objective
                                            - variable-for-projectCode: projectCode
                                            - variable-for-requirementContent: requirementContentObj2
                                            - variable-for-requirementId: requirementIdObj2
                                            - variable-for-objectiveText: objectiveTextObj2
                                            - variable-for-output: objectiveResult2
                                          inputs:
                                            - name: synthetic
                                            - name: projectCode
                                              ext: .txt
                                            - name: requirementContentObj2
                                              ext: .txt
                                            - name: requirementIdObj2
                                              ext: .txt
                                            - name: objectiveTextObj2
                                              ext: .txt
                                          outputs:
                                            - name: objectiveResult2
                                              type: objective-result
                                              nullable: true
                                              ext: .jsonl
                                          timeoutBeforeTerminate: 300
                                        - code: mhdg-rg.store-objective-result-2
                                          name: Store objective result
                                          function:
                                            code: mhdg-rg.store-objective-result
                                            context: internal
                                          metas:
                                            - objectiveResult: objectiveResult2
                                            - amendmentStatus: amendmentStatus2
                                          inputs:
                                            - name: projectCode
                                              ext: .txt
                                            - name: objectiveResult2
                                              ext: .txt
                                          outputs:
                                            - name: cascadeResult2
                                              type: cascade-result
                                              nullable: true
                                              ext: .json
                                            - name: amendmentStatus2
                                              type: amendment-status
                                              nullable: false
                                              ext: .txt
                                          timeoutBeforeTerminate: 60
                            #
                            # === ACTIVE/OBSOLETE gate for level-1 ===
                            # Level-1 currently has no further decomposition, but the
                            # OBSOLETE branch sets the requirement state.
                            #
                            - code: mh.nop-amendment-gate-2
                              name: mh.nop-amendment-gate-2
                              function:
                                code: mh.nop
                                context: internal
                              subProcesses:
                                logic: and
                                processes:
                                  - code: mh.nop-active-branch-2
                                    name: mh.nop-active-branch-2
                                    function:
                                      code: mh.nop
                                      context: internal
                                    condition: 'amendmentStatus2 == "ACTIVE" ? true : false'
                                  - code: mh.nop-obsolete-branch-2
                                    name: mh.nop-obsolete-branch-2
                                    function:
                                      code: mh.nop
                                      context: internal
                                    condition: 'amendmentStatus2 == "OBSOLETE" ? true : false'
                                    subProcesses:
                                      logic: sequential
                                      processes:
                                        - code: mhdg-rg.obsolete-requirement-2
                                          name: Obsolete level-1 requirement after objective
                                          function:
                                            code: mhdg-rg.obsolete-requirement
                                            context: internal
                                          metas:
                                            - requirementId: requirementId1
                                          inputs:
                                            - name: requirementId1
                                          timeoutBeforeTerminate: 60

                #
                # === OBSOLETE branch: obsolete the top-level requirement ===
                #
                - code: mh.nop-obsolete-branch
                  name: mh.nop-obsolete-branch
                  function:
                    code: mh.nop
                    context: internal
                  condition: 'amendmentStatus == "OBSOLETE" ? true : false'
                  subProcesses:
                    logic: sequential
                    processes:
                      - code: mhdg-rg.obsolete-requirement
                        name: Obsolete requirement after objective
                        function:
                          code: mhdg-rg.obsolete-requirement
                          context: internal
                        metas:
                          - requirementId: requirementId0
                        inputs:
                          - name: requirementId0
                        timeoutBeforeTerminate: 60
