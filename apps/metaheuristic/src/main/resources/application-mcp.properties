# =====================================================================
# Metaheuristic MCP Server profile
# Activated together with the 'dispatcher' profile, e.g.:
#   --spring.profiles.active=dispatcher,mcp
#
# Exposes a Streamable HTTP MCP endpoint at /rest/v1/mcp so external
# MCP clients (Claude Desktop, Claude Code, MCP Inspector, ...) can
# introspect MH state for debugging and tracing purposes.
# =====================================================================

spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=metaheuristic-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.instructions=Metaheuristic dispatcher debug tools. Read-mostly access to internal Variables, Tasks, ExecContexts, ExecContextGraphs and ExecContextTaskStates, plus start/stop/reset operations.

# Streamable HTTP endpoint path
spring.ai.mcp.server.streamable-http.mcp-endpoint=/rest/v1/mcp

# Capabilities
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.capabilities.resource=false
spring.ai.mcp.server.capabilities.prompt=false
spring.ai.mcp.server.capabilities.completion=false
spring.ai.mcp.server.tool-change-notification=false
