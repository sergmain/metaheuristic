# ===============================
# = Data source for MariaDB
# ===============================
# mariadb db @localhost
# Uses the native MariaDB driver (org.mariadb.jdbc.Driver), pinned to mariadb-java-client 2.7.9.
# MySQL-Connector-only URL params are intentionally dropped (not needed / unsupported by the MariaDB 2.x driver):
#   useUnicode, characterEncoding (UTF-8 is the driver default),
#   serverTimezone, useJDBCCompliantTimezoneShift, useLegacyDatetimeCode,
#   allowPublicKeyRetrieval, autoReconnect, failOverReadOnly, maxReconnects.
# SSL is off by default on the 2.x driver (useSsl=false); sslMode is a 3.x-only option, so it is omitted here.
spring.datasource.url = jdbc:mariadb://localhost:3306/aiai?zeroDateTimeBehavior=convertToNull
spring.datasource.username = aiai
spring.datasource.password = qwe321
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.sql.init.platform=mariadb
spring.sql.init.continue-on-error=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
